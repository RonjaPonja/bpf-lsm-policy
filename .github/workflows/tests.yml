name: eBPF LSM Test

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  test-lsm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Boot VM
        uses: ./.github/actions/vm-start
        with:
          image: .lvh/images/bpf-lsm-tester.qcow2

      - name: Only one VM on the system
        uses: ./.github/actions/vm-command
        with:
          run: cd /host && BPF_LSM_POLICY_ENFORCE=1 ./tests/vm-policy-test.sh

      - name: Inherited-child release does not bypass the VM lock
        uses: ./.github/actions/vm-command
        with:
          run: cd /host && BPF_LSM_POLICY_ENFORCE=1 ./tests/vm-lock-inherit-bypass.sh

      - name: bpffs umount does not bypass the lockdown
        uses: ./.github/actions/vm-command
        with:
          run: cd /host && BPF_LSM_POLICY_ENFORCE=1 ./tests/vm-umount-bypass.sh
